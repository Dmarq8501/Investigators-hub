<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA TERMINAL | v18.5 ADVANCED</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #050505; --panel: rgba(20, 0, 0, 0.94); }
        body { color: #eee; font-family: 'Courier New', Courier, monospace; margin: 0; background-color: var(--bg); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://r2.erweima.ai/i/1723145415712771509.png'); background-size: cover; background-position: center; opacity: 0.2; z-index: -2; }
        
        #login-screen { align-self: center; text-align: center; border: 2px solid var(--red); padding: 40px 20px; background: var(--panel); width: 85%; max-width: 380px; box-shadow: 0 0 25px var(--red); z-index: 10; border-radius: 10px; }
        #login-screen input { background: black; border: 1px solid var(--red); color: var(--red); padding: 15px; width: 100%; margin-top: 25px; text-align: center; box-sizing: border-box; font-size: 16px; outline: none; }
        #login-screen button { background: var(--red); color: black; border: none; padding: 12px; margin-top: 20px; cursor: pointer; font-weight: bold; width: 100%; }
        
        #main-interface { display: none; width: 100%; max-width: 1000px; padding: 20px; box-sizing: border-box; }
        header { border-bottom: 2px solid var(--red); padding: 15px; text-align: center; margin-bottom: 25px; background: rgba(0,0,0,0.7); }
        
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .category-box { background: var(--panel); border: 1px solid var(--red); padding: 25px 10px; text-align: center; cursor: pointer; transition: 0.3s; border-radius: 5px; }
        .category-box:hover { background: var(--red); color: black; box-shadow: 0 0 20px var(--red); }
        .category-box h3 { margin: 10px 0 0 0; font-size: 14px; }

        #display-area { display: none; background: #000; border: 2px solid var(--red); padding: 20px; position: relative; box-shadow: 0 0 30px rgba(255, 0, 0, 0.5); margin-top: 10px; min-height: 400px; }
        .close-btn { position: absolute; top: 5px; left: 5px; color: var(--red); cursor: pointer; border: 1px solid var(--red); padding: 4px 10px; font-size: 12px; background: #000; z-index: 100; }
        
        .form-group { background: #111; padding: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input, textarea, select { width: 100%; background: #0a0a0a; border: 1px solid #444; color: white; padding: 10px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; font-size: 13px; }
        .action-btn { background: var(--red); color: black; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px; }
        th { background: var(--red); color: black; padding: 8px; }
        td { border: 1px solid #333; padding: 10px; text-align: center; word-break: break-all; }
        
        .admin-only { display: none; }
        .wanted-img { width: 80px; height: 80px; object-fit: cover; border: 2px solid var(--red); margin: 5px; }
        .report-card { border: 1px solid #333; padding: 15px; margin-bottom: 15px; background: #080000; border-right: 4px solid var(--red); }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color: var(--red); margin:0;">FEDERAL AUTHENTICATION</h2>
        <input type="password" id="pass-input" placeholder="ACCESS CODE">
        <button onclick="checkPass()">LOGIN</button>
    </div>

    <div id="main-interface">
        <header>
            <h1 style="margin:0; color:var(--red); font-size: 18px;">INTELLIGENCE AGENCY TERMINAL</h1>
            <div id="auth-status" style="font-size: 10px; color: #00ff00;" class="blink"></div>
        </header>

        <div class="grid-container">
            <div class="category-box" onclick="showContent('ops')">⚔️<h3>العمليات</h3></div>
            <div class="category-box" onclick="showContent('wanted')">🚨<h3>المطلوبين</h3></div>
            <div class="category-box admin-only" onclick="showContent('agents')">🎖️<h3>العملاء</h3></div>
            <div class="category-box" onclick="showContent('intel')">🕵️<h3>المخبرين</h3></div>
            <div class="category-box" onclick="showContent('reports')">📄<h3>التقارير</h3></div>
            <div class="category-box" onclick="showContent('map')">📍<h3>الخريطة</h3></div> 
            <div class="category-box admin-only" onclick="showContent('logs')">📊<h3>سجل الدخول</h3></div>
            <div class="category-box" style="grid-column: span 2;" onclick="showContent('alerts')">⚠️<h3>التنبيهات</h3></div>
        </div>

        <div id="display-area">
            <span class="close-btn" onclick="closeDisplay()">إغلاق [X]</span>
            <div id="content-body">جاري جلب البيانات...</div>
        </div>
    </div>

    <script>
        // --- إعدادات سابابيس ---
        const SUPABASE_URL = 'https://diomqatoqyjkliujiqkb.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpb21xYXRvcXlqa2xpdWppcWtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODMyMDIsImV4cCI6MjA4OTI1OTIwMn0.0BLdFMhyhvcIzIexDnycRHFFKNseHsEuFkh3hbHUPRs';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let role = 'user';
        let currentUser = "";
        const adminPass = "65554874";
        const userPasses = ["User1", "User2", "User3", "User4", "User5", "User6", "User7", "User8", "User9", "User10"];

        async function checkPass() {
            const val = document.getElementById('pass-input').value.trim();
            if (val === adminPass) { role = 'admin'; currentUser = "DIRECTOR"; }
            else if (userPasses.includes(val)) { role = 'user'; currentUser = val; }
            else { alert("ACCESS DENIED"); return; }
            await supabase.from('logs').insert([{ username: currentUser, date: new Date().toLocaleString('ar-EG') }]);
            startSystem(currentUser);
        }

        function startSystem(msg) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-interface').style.display = 'block';
            document.getElementById('auth-status').innerText = "● SYSTEM ACTIVE | " + msg;
            if(role === 'admin') document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
        }

        function closeDisplay() { document.getElementById('display-area').style.display = "none"; }

        async function showContent(type) {
            const area = document.getElementById('display-area');
            const body = document.getElementById('content-body');
            area.style.display = "block";
            body.innerHTML = "جاري الاتصال بالقاعدة...";
            
            if(type === 'ops') renderOps(body);
            else if(type === 'wanted') renderWanted(body);
            else if(type === 'reports') renderReports(body);
            else if(type === 'intel') renderIntel(body);
            else if(type === 'agents') renderAgents(body);
            else if(type === 'logs') renderLogs(body);
            else if(type === 'alerts') renderAlerts(body);
            else if(type === 'map') renderMap(body);
        }

        // --- ⚔️ العمليات ---
        async function renderOps(c) {
            const { data: ops } = await supabase.from('operations').select('*').order('id', { ascending: false });
            let h = `<h3>⚔️ إدارة العمليات الميدانية</h3>`;
            if(role === 'admin') {
                h += `<div class="form-group">
                    <input id="o-n" placeholder="اسم العملية">
                    <input id="o-p" placeholder="مكان العملية">
                    <textarea id="o-d" placeholder="تفاصيل العملية الشاملة..."></textarea>
                    <button class="action-btn" onclick="addOpCloud()">تنشيط العملية</button>
                </div>`;
            }
            h += `<table><tr><th>العملية</th><th>الموقع</th><th>التفاصيل</th>${role==='admin'?'<th>X</th>':''}</tr>`;
            ops?.forEach(d => h += `<tr><td>${d.name}</td><td>${d.place}</td><td style="font-size:10px">${d.details}</td>${role==='admin'?`<td><button onclick="delCloud('operations',${d.id},'ops')">X</button></td>`:''}</tr>`);
            c.innerHTML = h + "</table>";
        }
        async function addOpCloud() {
            await supabase.from('operations').insert([{ name: document.getElementById('o-n').value, place: document.getElementById('o-p').value, details: document.getElementById('o-d').value }]);
            showContent('ops');
        }

        // --- 🚨 المطلوبين ---
        async function renderWanted(c) {
            const { data: wanted } = await supabase.from('wanted').select('*').order('id', { ascending: false });
            let h = `<h3>🚨 قائمة المطلوبين للعدالة</h3>`;
            if(role === 'admin') {
                h += `<div class="form-group">
                    <input id="w-n" placeholder="اسم المطلوب">
                    <input id="w-s" placeholder="الحالة (هارب/مراقب/معتقل)">
                    <input id="w-r" placeholder="رقم التقرير المرتبط">
                    <input id="w-i" placeholder="رابط الصورة">
                    <textarea id="w-d" placeholder="تفاصيل إضافية عن المجرم..."></textarea>
                    <button class="action-btn" onclick="addWantedCloud()">إضافة للقائمة</button>
                </div>`;
            }
            h += `<table><tr><th>الصورة</th><th>البيانات</th><th>التفاصيل</th>${role==='admin'?'<th>X</th>':''}</tr>`;
            wanted?.forEach(d => h += `<tr>
                <td><img src="${d.image}" class="wanted-img"></td>
                <td style="text-align:right"><b>الاسم:</b> ${d.name}<br><b>الحالة:</b> ${d.status}<br><b>تقرير:</b> ${d.report_number}</td>
                <td style="font-size:10px">${d.details || 'لا يوجد'}</td>
                ${role==='admin'?`<td><button onclick="delCloud('wanted',${d.id},'wanted')">X</button></td>`:''}</tr>`);
            c.innerHTML = h + "</table>";
        }
        async function addWantedCloud() {
            await supabase.from('wanted').insert([{ name: document.getElementById('w-n').value, status: document.getElementById('w-s').value, report_number: document.getElementById('w-r').value, image: document.getElementById('w-i').value, details: document.getElementById('w-d').value }]);
            showContent('wanted');
        }

        // --- 🕵️ المخبرين ---
        async function renderIntel(c) {
            const { data: intel } = await supabase.from('informants').select('*').order('id', { ascending: false });
            let h = `<h3>🕵️ سجل المخبرين السريين</h3>`;
            if(role === 'admin') {
                h += `<div class="form-group">
                    <input id="i-n" placeholder="الاسم الحركي/الحقيقي">
                    <input id="i-p" placeholder="رقم الهاتف">
                    <input id="i-a" placeholder="السكن / المنطقة">
                    <input id="i-i" placeholder="رابط صورة المخبر">
                    <textarea id="i-d" placeholder="تفاصيل إضافية / الموثوقية..."></textarea>
                    <button class="action-btn" onclick="addIntelCloud()">تسجيل مخبر</button>
                </div>`;
            }
            h += `<table><tr><th>الصورة</th><th>معلومات الاتصال</th><th>السكن والتفاصيل</th>${role==='admin'?'<th>X</th>':''}</tr>`;
            intel?.forEach(d => h += `<tr>
                <td><img src="${d.image || 'https://via.placeholder.com/60'}" class="wanted-img" style="border-radius:50%"></td>
                <td>${d.name}<br>${d.phone}</td>
                <td><b>السكن:</b> ${d.address}<br><small>${d.details}</small></td>
                ${role==='admin'?`<td><button onclick="delCloud('informants',${d.id},'intel')">X</button></td>`:''}</tr>`);
            c.innerHTML = h + "</table>";
        }
        async function addIntelCloud() {
            await supabase.from('informants').insert([{ name: document.getElementById('i-n').value, phone: document.getElementById('i-p').value, address: document.getElementById('i-a').value, image: document.getElementById('i-i').value, details: document.getElementById('i-d').value }]);
            showContent('intel');
        }

        // --- 🎖️ العملاء ---
        async function renderAgents(c) {
            const { data: agents } = await supabase.from('agents').select('*').order('id', { ascending: false });
            let h = `<h3>🎖️ إدارة شؤون العملاء</h3>`;
            if(role === 'admin') {
                h += `<div class="form-group">
                    <input id="an" placeholder="اسم العميل">
                    <input id="ac" placeholder="كود العميل السري">
                    <input id="ar" placeholder="الرتبة (وكيل/نقيب/خبير)">
                    <button class="action-btn" onclick="addAgentCloud()">تعيين عميل</button>
                </div>`;
            }
            h += `<table><tr><th>الاسم</th><th>الكود</th><th>الرتبة</th>${role==='admin'?'<th>X</th>':''}</tr>`;
            agents?.forEach(d => h += `<tr><td>${d.name}</td><td>${d.code}</td><td>${d.rank || 'N/A'}</td>${role==='admin'?`<td><button onclick="delCloud('agents',${d.id},'agents')">X</button></td>`:''}</tr>`);
            c.innerHTML = h + "</table>";
        }
        async function addAgentCloud() {
            await supabase.from('agents').insert([{ name: document.getElementById('an').value, code: document.getElementById('ac').value, rank: document.getElementById('ar').value }]);
            showContent('agents');
        }

        // --- 📄 التقارير ---
        async function renderReports(c) {
            const { data: reports } = await supabase.from('reports').select('*').order('id', { ascending: false });
            let h = `<h3>📄 أرشيف التقارير والصور</h3>
                <div class="form-group">
                    <input id="r-num" placeholder="رقم التقرير">
                    <input id="r-img" placeholder="رابط صورة توضيحية">
                    <textarea id="r-body" placeholder="محتوى التقرير التفصيلي..."></textarea>
                    <button class="action-btn" onclick="addReportCloud()">رفع التقرير</button>
                </div>`;
            reports?.forEach(d => h += `<div class="report-card">
                <div style="display:flex; justify-content:space-between">
                    <small style="color:red">REPORT #${d.report_number}</small>
                    <small style="color:#666">${d.date}</small>
                </div>
                <p><b>الكاتب:</b> ${d.author}</p>
                <p>${d.content}</p>
                ${d.image ? `<img src="${d.image}" style="max-width:100%; border:1px solid #333; margin-top:10px;">` : ''}
                ${role==='admin'?`<br><button onclick="delCloud('reports',${d.id},'reports')" style="margin-top:10px">حذف التقرير</button>`:''}
            </div>`);
            c.innerHTML = h;
        }
        async function addReportCloud() {
            await supabase.from('reports').insert([{ report_number: document.getElementById('r-num').value, content: document.getElementById('r-body').value, image: document.getElementById('r-img').value, author: currentUser, date: new Date().toLocaleString('ar-EG') }]);
            showContent('reports');
        }

        // --- وظائف عامة ---
        async function delCloud(table, id, type) {
            if(role !== 'admin') return;
            if(!confirm("تأكيد حذف البيانات نهائياً؟")) return;
            await supabase.from(table).delete().eq('id', id);
            showContent(type);
        }

        function renderMap(container) {
            container.innerHTML = `<div style="text-align:center; border:1px solid var(--red); padding:10px; margin-bottom:10px;"><a href="https://gta-5-map.com/" target="_blank" class="action-btn" style="text-decoration:none; padding:10px 20px; width:auto; display:inline-block;">فتح الرادار المستقل</a></div><iframe src="https://gta-5-map.com/" style="width:100%; height:550px; border:2px solid var(--red);"></iframe>`;
        }

        async function renderLogs(c) {
            const { data: logs } = await supabase.from('logs').select('*').order('id', { ascending: false });
            let h = `<h3>📊 سجلات الدخول</h3>`;
            logs?.forEach(x => h += `<div style="border-bottom:1px solid #222; padding:8px; font-size:12px;">${x.username} | ${x.date}</div>`);
            c.innerHTML = h;
        }

        async function renderAlerts(c) {
            c.innerHTML = `<h3>⚠️ التنبيهات</h3><div style="border:1px solid yellow; padding:15px; text-align:center; color:yellow; font-size:13px;">النظام متصل بالسحابة. جميع الحقول الجديدة مفعلة.</div>`;
        }
    </script>
</body>
</html>
